<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <title>Planning – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #111827;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 45%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    .container {
      max-width: 480px;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 1.5rem;
      padding: 2rem 1.75rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow:
        0 24px 80px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.8);
      position: relative;
      z-index: 2;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.18), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.18), transparent 55%);
      opacity: 0.7;
      pointer-events: none;
      z-index: -1;
    }

    .title {
      font-size: 1.9rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.04em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      display: block;
      margin-bottom: 0.35rem;
    }

    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: #020617;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 0.8rem;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
    }

    button {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 0.9rem;
      border: none;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--accent);
      color: #0f172a;
      margin-bottom: 0.6rem;
    }

    .error {
      font-size: 0.8rem;
      color: #f87171;
      min-height: 1.2em;
      margin-bottom: 0.6rem;
    }

    .hidden-content {
      display: none;
      margin-top: 1.6rem;
      padding: 1.2rem;
      border-radius: 1rem;
      border: 1px dashed rgba(148, 163, 184, 0.5);
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
    }

    /* === SVG “pelikaner” i baggrunden === */

    .pelican-instance {
      position: fixed;
      width: 90px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
      animation-timing-function: linear;
      animation-iteration-count: 1;
      filter: drop-shadow(0 4px 10px rgba(15, 23, 42, 0.9));
    }

    .pelican-from-left {
      left: -140px;
      animation-name: fly-right;
    }

    .pelican-from-right {
      right: -140px;
      transform: scaleX(-1);
      animation-name: fly-left;
    }

    @keyframes fly-right {
      0% {
        transform: translateX(0) translateY(0) scale(0.9);
        opacity: 0;
      }
      10% {
        opacity: 0.5;
      }
      70% {
        transform: translateX(120vw) translateY(-25px) scale(1.05);
        opacity: 0.7;
      }
      100% {
        transform: translateX(120vw) translateY(-40px) scale(1.1);
        opacity: 0;
      }
    }

    @keyframes fly-left {
      0% {
        transform: scaleX(-1) translateX(0) translateY(0) scale(0.9);
        opacity: 0;
      }
      10% {
        opacity: 0.5;
      }
      70% {
        transform: scaleX(-1) translateX(-120vw) translateY(20px) scale(1.05);
        opacity: 0.7;
      }
      100% {
        transform: scaleX(-1) translateX(-120vw) translateY(35px) scale(1.1);
        opacity: 0;
      }
    }

    /* Skjul skabelonen */
    #pelican-template {
      display: none;
    }
  </style>
</head>

<body>
  <!-- SVG-skabelon: enkel, original fugl i stil med en pelikan -->
  <svg id="pelican-template" viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- Krop -->
    <path d="M18 42 Q40 20 72 24 Q96 26 110 34 Q90 40 76 46 Q54 54 30 52 Q22 50 18 42Z"
          fill="#e5e7eb" />
    <!-- Vinge -->
    <path d="M34 40 Q52 18 76 20 Q60 32 56 46 Q44 44 34 40Z"
          fill="#cbd5f5" />
    <!-- Hoved -->
    <circle cx="22" cy="32" r="7" fill="#e5e7eb" />
    <!-- Næb -->
    <path d="M15 32 L3 28 L3 34 Z" fill="#fbbf24" />
    <!-- Øje -->
    <circle cx="24" cy="30.5" r="1.5" fill="#020617" />
    <!-- Lille skygge under kroppen -->
    <ellipse cx="60" cy="60" rx="32" ry="6" fill="rgba(15,23,42,0.45)" />
  </svg>

  <main class="container">
    <div class="glow"></div>

    <h1 class="title">Planning adgang</h1>
    <p class="subtitle">Indtast nøgle for at fortsætte.</p>

    <div id="login-area">
      <label for="key">Adgangsnøgle</label>
      <input id="key" type="password" autocomplete="off" />
      <button onclick="checkKey()">Login</button>
      <div id="error" class="error"></div>
    </div>

    <div id="content" class="hidden-content">
      <strong>Excuse you, hvad laver du her?</strong>
    </div>
  </main>

  <script>
    const SECRET_KEY = "anderssuperstar";

    function checkKey() {
      const input = document.getElementById("key");
      const error = document.getElementById("error");
      const loginArea = document.getElementById("login-area");
      const content = document.getElementById("content");

      if (input.value === SECRET_KEY) {
        error.textContent = "";
        loginArea.style.display = "none";
        content.style.display = "block";
      } else {
        error.textContent = "Forkert nøgle.";
      }
    }

    // === Pelikan-spawn ===
    function spawnPelican() {
      const template = document.getElementById("pelican-template");
      if (!template) return;

      const clone = template.cloneNode(true);
      clone.removeAttribute("id");
      clone.classList.add("pelican-instance");

      const topVH = 10 + Math.random() * 70;
      clone.style.top = topVH + "vh";

      const fromLeft = Math.random() < 0.5;
      if (fromLeft) {
        clone.classList.add("pelican-from-left");
      } else {
        clone.classList.add("pelican-from-right");
      }

      const duration = 18 + Math.random() * 10; // 18–28 sek
      clone.style.animationDuration = duration + "s";

      document.body.appendChild(clone);

      setTimeout(() => {
        clone.remove();
      }, (duration + 2) * 1000);
    }

    spawnPelican();
    setTimeout(spawnPelican, 4000);

    setInterval(() => {
      spawnPelican();
    }, 9000);
  </script>
</body>
</html>
